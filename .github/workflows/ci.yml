name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run backend tests in Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create CI .env file
        run: |
          cat > .env <<'EOF'
          DJANGO_SECRET_KEY=ci-insecure-key
          DJANGO_SETTINGS_MODULE=backend.settings.test
          DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
          FRONTEND_BASE_URL=http://localhost:3000

          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          POSTGRES_USER=crm_ci
          POSTGRES_PASSWORD=crm_ci
          POSTGRES_DB=crm_ci
          POSTGRES_TEST_DB=crm_test

          CELERY_BROKER_URL=redis://redis:6379/0
          REDIS_HOST=redis
          REDIS_PORT=6379

          STRIPE_SECRET_KEY=test_secret_key
          STRIPE_PUBLISHABLE_KEY=test_publishable_key
          STRIPE_WEBHOOK_SECRET=test_webhook_secret

          EMAIL_BACKEND=django.core.mail.backends.locmem.EmailBackend
          DEFAULT_FROM_EMAIL=ci@example.com

          AWS_ACCESS_KEY_ID=test
          AWS_SECRET_ACCESS_KEY=test
          AWS_STORAGE_BUCKET_NAME=test
          AWS_S3_REGION_NAME=ca-central-1
          AWS_S3_CUSTOM_DOMAIN=localhost
          EOF

      - name: Set up Docker Compose
        run: docker compose version

      - name: Run backend tests
        run: |
          docker compose -f docker-compose.dev.yml -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend-tests backend-tests

      - name: Clean up Docker resources
        if: always()
        run: |
          docker compose -f docker-compose.dev.yml -f docker-compose.test.yml down -v --remove-orphans

  frontend-tests:
    name: Run frontend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
