<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>New Project Assigned</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:20px;">
  <div style="max-width:600px; margin:auto; background:#fff; border-radius:6px; padding:30px; box-shadow:0 2px 8px rgba(0,0,0,0.05);">
    <h2 style="color:#2c3e50;">You Have Been Assigned to a New Project</h2>
    <p style="font-size:16px; color:#333;">
      You have been added to the project <strong>{{ project_name }}</strong>.
    </p>
    <p style="font-size:14px; color:#555;">
      Project ID: {{ project_id }}
    </p>
    <p style="font-size:14px; color:#888; margin-top:30px;">
      Please check your project dashboard for details.
    </p>
  </div>
</body>
</html>
