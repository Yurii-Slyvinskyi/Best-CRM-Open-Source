<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Project Status Updated</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:20px;">
  <div style="max-width:600px; margin:auto; background:#fff; border-radius:6px; padding:30px; box-shadow:0 2px 8px rgba(0,0,0,0.05);">
    <h2 style="color:#2980b9;">Project Status Updated</h2>
    <p style="font-size:16px; color:#333;">
      The status of project <strong>{{ project_name }}</strong> has been updated.
    </p>
    <p style="font-size:15px; color:#444;">
      New status: <strong>{{ new_status }}</strong>
    </p>
    <p style="font-size:14px; color:#888; margin-top:30px;">
      This is an automated notification.
    </p>
  </div>
</body>
</html>
