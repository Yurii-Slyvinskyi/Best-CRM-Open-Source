<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Review Updated Notification</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:20px;">
  <div style="max-width:600px; margin:auto; background:#fff; border-radius:6px; padding:30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
    <h2 style="color:#2c3e50;">Review Updated</h2>
    <p style="font-size:16px; color:#333;">
      A review for project <strong>{{ project_name }}</strong> has been updated.
    </p>
    <ul style="list-style:none; padding-left:0; font-size:15px; color:#444;">
      <li><strong>Client:</strong> {{ client_name }}</li>
      <li><strong>New Rating:</strong> {{ new_rating }}/5</li>
      <li><strong>Review ID:</strong> {{ review_id }}</li>
      <li><strong>Updated at:</strong> {{ timestamp }}</li>
    </ul>
    <p style="font-size:14px; color:#888; margin-top:30px;">
      This message was sent automatically.
    </p>
  </div>
</body>
</html>
