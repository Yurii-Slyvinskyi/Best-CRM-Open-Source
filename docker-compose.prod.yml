services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: backend
      DJANGO_SETTINGS_MODULE: backend.settings.prod
      FRONTEND_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,${DJANGO_ALLOWED_HOSTS:-}
      CSRF_TRUSTED_ORIGINS: http://localhost:${APP_PORT:-8080},${CSRF_TRUSTED_ORIGINS:-}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-False}
      DJANGO_SECURE_COOKIES: ${DJANGO_SECURE_COOKIES:-False}
      DJANGO_HSTS_SECONDS: ${DJANGO_HSTS_SECONDS:-0}
      DJANGO_LOG_DIR: /var/log/django
      USE_S3_STORAGE: ${USE_S3_STORAGE:?USE_S3_STORAGE must be set to True or False}
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
      - logs_data:/var/log/django
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/', timeout=5)"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    restart: unless-stopped
    command: celery -A backend worker --loglevel=info --concurrency=2 -O fair
    env_file: .env
    environment:
      SERVICE_NAME: celery_worker
      DJANGO_SETTINGS_MODULE: backend.settings.prod
      DJANGO_LOG_DIR: /var/log/django
      USE_S3_STORAGE: ${USE_S3_STORAGE:?USE_S3_STORAGE must be set to True or False}
    volumes:
      - media_data:/app/media
      - logs_data:/var/log/django
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend inspect ping -d celery@$$HOSTNAME --timeout=5 | grep -q pong"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  daphne:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    restart: unless-stopped
    command: daphne -b 0.0.0.0 -p 8001 --proxy-headers backend.asgi:application
    env_file: .env
    environment:
      SERVICE_NAME: daphne
      DJANGO_SETTINGS_MODULE: backend.settings.prod
      DJANGO_LOG_DIR: /var/log/django
      USE_S3_STORAGE: ${USE_S3_STORAGE:?USE_S3_STORAGE must be set to True or False}
    volumes:
      - media_data:/app/media
      - logs_data:/var/log/django
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8001), timeout=5).close()"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      backend:
        condition: service_healthy
      daphne:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
  logs_data:
